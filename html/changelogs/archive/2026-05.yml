2026-05-01:
  Lumipharon:
  - bugfix: fixed exploits around taking items from other mobs and ghost dupes
  - bugfix: fixed an exploit that let certain xenos and other mobs equip and use items
      they shouldn't be able to
  - bugfix: fixed the proxy sensor datum triggering when it shouldn't
  - bugfix: fixed build designator holograms not fully displaying
  - balance: FK-88 HE shells are unguided by default, and have higher shell speed.
      AP shells have lower shell speed and minimum range
  - bugfix: fixed an exploit with stacking attachment abilities
  - bugfix: fixed a visual issue for south facing wallmount objects
  ivanmixo:
  - balance: Capsule barricade deconstruction doesn't yield as many materials
2026-05-05:
  Joe13413:
  - balance: The lever action rifle seasonal shoots 2x faster, holds 4 more rounds,
      has reduced recoil, and can take more attachments.
2026-05-07:
  Runian:
  - bugfix: Tactical sensors now show blips through walls.
  - bugfix: Xenomorphs with friendly IFF correctly creates friendly blips for motion
      sensors.
  - bugfix: Wearing a belt while having your only ID in your hand now correctly indicates
      that you have an ID to many things that check for your ID.
  - refactor: Motion detection (as seen with the tactical sensor) is now a component.
2026-05-08:
  Lumipharon:
  - rscadd: Added some more makeshift surgery tool options for some surgery steps
  - bugfix: Using makeshift surgery tools checks to see if they are in a valid state,
      such as a welder being on, etc
  - code_imp: Some generic surgery steps use a shared global list of tool options
      instead of copy paste lists
  - bugfix: fixed some minor intercom position issues
  - balance: King roar and some other xeno abilities are more effective at extinguishing
      or weakening fire
  - code_imp: Cleaned up a bunch of fire related arg/var names for clarity
  - bugfix: Sticky resin/weeds no longer slown you down when moving over dense objects
  - bugfix: fixed being able to rotate certain chairs you shouldn't be able to, allowing
      you to hide your sprite entirely
  - bugfix: fixed certain jungle walls being called 'GM'
  - bugfix: The spotting rifle checks the SG skill instead of the rifle skill
  - bugfix: fixed an issue with forcemoving beds with bodybags buckled to them
  - bugfix: fixed APC, cloner and cryo lights
  - balance: Non player mobs can push other mobs normally
  - qol: Important stuff such as objectives and the nuke layers higher on the minimap
  - rscadd: 'Campaign: Buying and using assets can be done even when dead'
