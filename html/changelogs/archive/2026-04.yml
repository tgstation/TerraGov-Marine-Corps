  - bugfix: fixed a grenade runtime when detonating in a clientless mob's hand
  - balance: The delay for allowing pods to deploy after Alamo/Tad deployment time
      has been reduced from 10 minutes to 2 minutes
  - refactor: refactored climbing code into a component
  - rscadd: You can now climb onto multitile vehicles and various other misc machinery,
      clankers rejoice
  - qol: climbing a multitile structure will now attempt to climb the tile you actually
      click on
